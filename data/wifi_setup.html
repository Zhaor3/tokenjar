     Edit main.cpp's PORTAL_HTML[] if you need to change the portal. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOKENJAR Setup</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #f5f1ea; font-family: 'JetBrains Mono', monospace; padding: 24px; }
h1 { font-size: 14px; letter-spacing: 4px; color: #d97757; margin-bottom: 24px; }
label { display: block; font-size: 11px; letter-spacing: 2px; color: #6b6660; margin: 16px 0 4px; }
input, select { width: 100%; padding: 10px; background: #111; border: 1px solid #1a1a1a;
                color: #f5f1ea; font-size: 13px; font-family: inherit; }
input:focus { border-color: #d97757; outline: none; }
button { width: 100%; padding: 12px; margin-top: 20px; background: #d97757; color: #000;
         border: none; font-size: 12px; letter-spacing: 2px; cursor: pointer; font-family: inherit; }
button:active { opacity: .8; }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
.result { font-size: 11px; margin-top: 8px; color: #6b6660; }
.ok { color: #4ade80; }
.fail { color: #ef4444; }
a { color: #d97757; }
hr { border: 0; border-top: 1px solid #1a1a1a; margin: 20px 0; }
</style>
</head>
<body>
<h1>TOKENJAR</h1>
<!-- See main.cpp PORTAL_HTML[] for the live version -->
</body>
</html>
