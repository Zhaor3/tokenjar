[env:esp32s3]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino

board_build.partitions = partitions.csv
board_build.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi

monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+

build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=9
    -DTFT_SCLK=7
    -DTFT_CS=5
    -DTFT_DC=4
    -DTFT_RST=6
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_FONT_MONTSERRAT_10=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_ARC=1
    -DLV_USE_SPINNER=1
    -DLV_USE_CANVAS=1
    -DLV_USE_LINE=1
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIM=1
    -DLV_USE_FLEX=1
    -DLV_USE_DRAW_SW=1
    -DLV_USE_THEME_DEFAULT=0
    -DLV_USE_THEME_SIMPLE=0
    -DLV_BUILD_EXAMPLES=0
    -DLV_COLOR_DEPTH=16
    -DLV_MEM_SIZE=49152
    -DLV_DEF_REFR_PERIOD=33
    -DLV_DPI_DEF=130
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    bodmer/TFT_eSPI@2.5.43
    lvgl/lvgl@9.2.2
    bblanchon/ArduinoJson@7.2.1
    madhephaestus/ESP32Encoder@0.11.6
    ricmoo/QRCode@0.0.1
